<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndexNow Ping Tool — Ahsan Jannat</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#FAF8F9;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
  .card{background:#fff;border:1px solid #E8E0E8;border-radius:20px;padding:2.5rem;max-width:540px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.06)}
  .logo{width:48px;height:48px;background:#6B8C6E;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem;font-weight:700;margin-bottom:1.5rem}
  h1{font-size:1.5rem;color:#1E161E;margin-bottom:6px}
  p{color:#7A6A78;font-size:.875rem;line-height:1.7;margin-bottom:1.25rem}
  .info{background:#F0F5F1;border-radius:10px;padding:14px 16px;margin-bottom:1.5rem;font-size:13px;color:#4A6E4C;word-break:break-all}
  .info strong{display:block;margin-bottom:4px;color:#2D4D2F;font-size:11px;text-transform:uppercase;letter-spacing:.05em}
  .progress-bar{width:100%;height:6px;background:#F0EDF0;border-radius:3px;margin-bottom:1.25rem;overflow:hidden;display:none}
  .progress-bar.show{display:block}
  .progress-fill{height:100%;background:linear-gradient(90deg,#6B8C6E,#C9A0AC);border-radius:3px;width:0%;transition:width .3s ease}
  button{width:100%;background:#6B8C6E;color:#fff;border:none;padding:15px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}
  button:hover{background:#4D6E50;transform:translateY(-1px)}
  button:disabled{opacity:.7;cursor:not-allowed;transform:none}
  .log{margin-top:1.25rem;background:#1E161E;border-radius:10px;padding:16px;font-family:monospace;font-size:12px;color:#C9A0AC;max-height:240px;overflow-y:auto;display:none}
  .log.show{display:block}
  .ok{color:#6B8C6E} .err{color:#EF4444} .inf{color:#93C5FD} .warn{color:#F59E0B}
  .count{margin-top:1rem;text-align:center;font-size:12px;color:#9A8A98;display:none}
  .count.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">AJ</div>
  <h1>IndexNow Ping Tool</h1>
  <p>Instantly notify Google, Bing and Yandex of all <strong>26 pages</strong> — so they crawl and index them within hours, not weeks.</p>
  <div class="info">
    <strong>Your IndexNow Key</strong>
    cc02b558a0bd4a69ae052b226cbe50e5
  </div>
  <div class="progress-bar" id="bar"><div class="progress-fill" id="fill"></div></div>
  <button id="btn" onclick="runPing()">
    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2 11 13"/><path d="M22 2 15 22 11 13 2 9l20-7z"/></svg>
    Ping All Search Engines (26 pages)
  </button>
  <div class="count" id="count"></div>
  <div class="log" id="log"></div>
</div>
<script>
const KEY  = "cc02b558a0bd4a69ae052b226cbe50e5";
const BASE = "https://ahsan-jannat.netlify.app";
const URLS = [
  "https://ahsan-jannat.netlify.app/index.html",
  "https://ahsan-jannat.netlify.app/about.html",
  "https://ahsan-jannat.netlify.app/services.html",
  "https://ahsan-jannat.netlify.app/experience.html",
  "https://ahsan-jannat.netlify.app/case-studies.html",
  "https://ahsan-jannat.netlify.app/blog.html",
  "https://ahsan-jannat.netlify.app/contact.html",
  "https://ahsan-jannat.netlify.app/free-audit.html",
  "https://ahsan-jannat.netlify.app/blog/meta-ads-complete-guide-2026.html",
  "https://ahsan-jannat.netlify.app/blog/meta-ads-targeting-options-2026.html",
  "https://ahsan-jannat.netlify.app/blog/meta-ads-campaign-objectives-2026.html",
  "https://ahsan-jannat.netlify.app/blog/meta-ads-retargeting-setup-2026.html",
  "https://ahsan-jannat.netlify.app/blog/meta-ads-creative-strategy-2026.html",
  "https://ahsan-jannat.netlify.app/blog/how-to-use-ai-in-content-writing.html",
  "https://ahsan-jannat.netlify.app/blog/how-to-do-keyword-research-for-seo.html",
  "https://ahsan-jannat.netlify.app/blog/on-page-seo-complete-guide.html",
  "https://ahsan-jannat.netlify.app/blog/seo-vs-sem.html",
  "https://ahsan-jannat.netlify.app/blog/seo-vs-aeo-vs-geo.html",
  "https://ahsan-jannat.netlify.app/blog/how-to-rank-in-ai-overviews.html",
  "https://ahsan-jannat.netlify.app/blog/technical-seo-checklist-2026.html",
  "https://ahsan-jannat.netlify.app/blog/what-is-geo.html",
  "https://ahsan-jannat.netlify.app/blog/google-business-profile-optimization.html",
  "https://ahsan-jannat.netlify.app/blog/link-building-2026.html",
  "https://ahsan-jannat.netlify.app/blog/core-web-vitals-2026.html",
  "https://ahsan-jannat.netlify.app/blog/how-to-win-paa-boxes.html",
  "https://ahsan-jannat.netlify.app/blog/website-security-seo-factor.html"
];

function log(m, c='') {
  const d = document.getElementById('log');
  d.classList.add('show');
  d.innerHTML += '<div class="' + c + '">' + m + '</div>';
  d.scrollTop = d.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('bar').classList.add('show');
  document.getElementById('fill').style.width = pct + '%';
}

// GET request via image tag — works around CORS completely
function pingViaImage(url) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = img.onerror = () => resolve('sent');
    img.src = url + '&_t=' + Date.now();
    setTimeout(() => resolve('timeout'), 3000);
  });
}

// Fetch with no-cors — request IS sent, response not readable
async function pingNoCorsFetch(url) {
  try {
    await fetch(url, { mode: 'no-cors', cache: 'no-store' });
    return 'sent';
  } catch(e) {
    return 'error: ' + e.message;
  }
}

async function runPing() {
  const btn  = document.getElementById('btn');
  const cnt  = document.getElementById('count');
  btn.disabled = true;
  btn.innerHTML = '⏳ Pinging...';
  document.getElementById('log').innerHTML = '';
  cnt.classList.remove('show');

  log('🚀 Starting ping for ' + URLS.length + ' pages...', 'inf');
  log('', '');

  // ── Step 1: IndexNow GET (one request per URL) ──
  log('📡 Submitting to IndexNow (Google, Bing, Yandex)...', 'inf');
  let ok = 0, fail = 0;

  for (let i = 0; i < URLS.length; i++) {
    const url  = URLS[i];
    const slug = url.replace(BASE, '').replace('/blog/', 'blog/');
    const pingUrl = 'https://api.indexnow.org/indexnow?url=' + encodeURIComponent(url) + '&key=' + KEY;
    setProgress(Math.round((i / URLS.length) * 80));

    const result = await pingNoCorsFetch(pingUrl);
    if (result === 'sent') {
      ok++;
      log('  ✓ ' + slug, 'ok');
    } else {
      fail++;
      log('  ✗ ' + slug + ' — ' + result, 'err');
    }
    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 80));
  }

  setProgress(85);
  log('', '');
  log('IndexNow: ' + ok + '/' + URLS.length + ' submitted ✓', 'ok');

  // ── Step 2: Google Sitemap Ping ──
  log('', '');
  log('📡 Pinging Google sitemap...', 'inf');
  const gResult = await pingNoCorsFetch(
    'https://www.google.com/ping?sitemap=' + encodeURIComponent(BASE + '/sitemap.xml')
  );
  log('  ✓ Google sitemap ping sent', 'ok');
  setProgress(92);

  // ── Step 3: Bing Sitemap Ping ──
  log('📡 Pinging Bing sitemap...', 'inf');
  const bResult = await pingNoCorsFetch(
    'https://www.bing.com/ping?sitemap=' + encodeURIComponent(BASE + '/sitemap.xml')
  );
  log('  ✓ Bing sitemap ping sent', 'ok');
  setProgress(100);

  // ── Done ──
  log('', '');
  log('✅ Complete! ' + URLS.length + ' pages submitted to 3 search engines.', 'ok');
  log('📊 Check indexing: search.google.com/search-console → URL Inspection', 'inf');
  log('⏱  Pages typically crawled within 30 minutes – 24 hours.', 'inf');

  cnt.classList.add('show');
  cnt.textContent = 'Last pinged: ' + new Date().toLocaleString();

  btn.disabled = false;
  btn.innerHTML = '✓ Pinged! Run again after next deploy';
}
</script>
</body>
</html>
